<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {%- if site.description -%}
    <meta name="description" content="{{ site.description | strip_html | strip_newlines | escape }}">
    {%- endif -%}

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      crossorigin="anonymous" integrity="sha384-0ms/h+58rO+kD4ZcGXBlaVmYYLAzjnShRDqSENoz6qVSmfzrq1l2SEasWHESL/Iu">
    <link rel="icon" href="{{ '/favicon-32x32.png' | relative_url }}" sizes="32x32" type="image/png">
    <link rel="icon" href="{{ '/favicon-16x16.png' | relative_url }}" sizes="16x16" type="image/png">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
    <meta name="theme-color" content="#FFF6F6">
    <!-- Site CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.time | date: '%s' }}">


    {%- include head-custom.html -%}
  </head>
  <body>
    <!-- Start of new HEADER structure from Redesign commit -->
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>

    </header>
    
    <main>
      {{ content }}
    </main>

    <!-- Spacer from Redesign commit -->
    <div style="height: 50px;"></div>

    <!-- Abstract toggle + new-tab links -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // ── Smooth abstract toggle ──
        document.querySelectorAll(".toggle-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var target = document.getElementById(btn.dataset.target);
            if (!target) return;
            var isOpen = target.classList.contains("is-open");
            if (isOpen) {
              target.classList.remove("is-open");
              btn.setAttribute("aria-expanded", "false");
            } else {
              target.classList.add("is-open");
              btn.setAttribute("aria-expanded", "true");
            }
          });
        });

        // ── Make paper-title links open in new tab ──
        document.querySelectorAll(".paper-title a").forEach(function (link) {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noreferrer");
        });
      });
    </script>

    <!-- Your existing other scripts (re-integrated from HEAD) -->
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
    {% if site.google_analytics %}
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    {% endif %}
  </body>
</html>
